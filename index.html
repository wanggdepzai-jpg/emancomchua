<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E Ă C C</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0d0d11;
      overflow: hidden;
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #camera-feed {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1); 
      transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }

    #bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d0d11;
      z-index: 0;
    }

    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      transform: scaleX(-1); 
      z-index: 10;
      pointer-events: none;
    }

    #status {
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      z-index: 20;
      background: rgba(15, 15, 20, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 13px;
      letter-spacing: 1px;
      text-align: center;
      white-space: nowrap;
      transition: opacity 0.5s ease;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

  <div id="bg-layer"></div>
  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="particle-canvas"></canvas>
  
  <div id="status">Đang thiết lập camera...</div>

  <script>
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;
    let isMobile = width < height;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      isMobile = width < height;
      calculateTargets();
    });

    const HAND_CONNECTIONS = [
      [0, 1], [1, 2], [2, 3], [3, 4],         
      [0, 5], [5, 6], [6, 7], [7, 8],         
      [0, 9], [9, 10], [10, 11], [11, 12],    
      [0, 13], [13, 14], [14, 15], [15, 16],  
      [0, 17], [17, 18], [18, 19], [19, 20],  
      [5, 9], [9, 13], [13, 17]               
    ];

    let particles = [];      
    
    let currentState = 'IDLE'; 
    let heartHoldFrames = 0;
    const FRAMES_TO_TRIGGER = 45; 

    let liveHeartCenter = { x: width / 2, y: height / 2 };
    let liveHeartScale = 1.0;
    let currentHandsData = null; 
    let heartRotationAngle = 0;

    let textPoints = [];
    let heartOffsets = [];

    // Chuyển đổi tọa độ từ MediaPipe (0-1) sang Canvas chuẩn Object-fit Cover chống méo trên điện thoại
    function getCanvasCoords(pt) {
      let videoWidth = video.videoWidth || 640;
      let videoHeight = video.videoHeight || 480;
      let videoAspect = videoWidth / videoHeight;
      let canvasAspect = width / height;

      let cx, cy;
      if (canvasAspect > videoAspect) {
        let scaledHeight = width / videoAspect;
        cx = pt.x * width;
        cy = pt.y * scaledHeight + (height - scaledHeight) / 2;
      } else {
        let scaledWidth = height * videoAspect;
        cx = pt.x * scaledWidth + (width - scaledWidth) / 2;
        cy = pt.y * height;
      }
      return { x: cx, y: cy };
    }

    function calculateTargets() {
      textPoints = [];
      heartOffsets = [];

      const tempCanvas = document.createElement('canvas');
      const tCtx = tempCanvas.getContext('2d');
      tempCanvas.width = width;
      tempCanvas.height = height;
      
      tCtx.fillStyle = 'white';
      tCtx.textAlign = 'center';
      tCtx.textBaseline = 'middle';

      // Xử lý bố cục chữ thông minh: Điện thoại xếp 2 dòng, Máy tính xếp 1 dòng
      if (isMobile) {
        const fontSize = Math.min(width * 0.11, 42);
        tCtx.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
        tCtx.fillText("em ăn cơm", width / 2, height / 2 - fontSize * 0.65);
        tCtx.fillText("chưa?", width / 2, height / 2 + fontSize * 0.65);
      } else {
        const fontSize = Math.min(width * 0.055, 60);
        tCtx.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
        tCtx.fillText("em ăn cơm chưa?", width / 2, height / 2);
      }

      const imgData = tCtx.getImageData(0, 0, width, height).data;
      
      // Điện thoại quét lưới dày hơn (step nhỏ) để chữ sắc nét không bết dính
      const step = isMobile ? 3 : 4; 
      for (let y = 0; y < height; y += step) {
        for (let x = 0; x < width; x += step) {
          if (imgData[(y * width + x) * 4 + 3] > 128) {
            textPoints.push({ x: width - x, y }); 
          }
        }
      }

      for (let i = 0; i < textPoints.length; i++) {
        const t = Math.random() * Math.PI * 2;
        const hx = 16 * Math.pow(Math.sin(t), 3);
        const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        heartOffsets.push({ rawX: hx, rawY: hy });
      }

      initParticles();
    }

    function initParticles() {
      particles = [];
      // Thu nhỏ size hạt trên điện thoại để hiển thị nét chữ mảnh và rõ ràng
      let baseSize = isMobile ? 0.7 : 1.1;
      let extraSize = isMobile ? 0.9 : 1.3;

      for (let i = 0; i < textPoints.length; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: 0, vy: 0,
          angle: Math.random() * Math.PI * 2,
          angleSpeed: 0.01 + Math.random() * 0.015,
          friction: 0.92,
          ease: 0.02 + Math.random() * 0.015,
          size: baseSize + Math.random() * extraSize,
          color: 'rgba(255, 255, 255, 0.6)' 
        });
      }
    }

    function processHands(hands) {
      currentHandsData = hands;

      if (hands.length === 2) {
        const handA = hands[0];
        const handB = hands[1];
        
        const thumbA = handA[4], thumbB = handB[4];
        const indexA = handA[8], indexB = handB[8];
        const wristA = handA[0], wristB = handB[0];
        
        const thumbDist = Math.hypot(thumbA.x - thumbB.x, thumbA.y - thumbB.y);
        const indexDist = Math.hypot(indexA.x - indexB.x, indexA.y - indexB.y);
        const wristSpread = Math.hypot(wristA.x - wristB.x, wristA.y - wristB.y);

        if (thumbDist < 0.13 && indexDist < 0.13 && wristSpread > 0.16) {
          const pIdxA = getCanvasCoords(indexA);
          const pIdxB = getCanvasCoords(indexB);
          const pThmA = getCanvasCoords(thumbA);
          const pThmB = getCanvasCoords(thumbB);

          const topX = (pIdxA.x + pIdxB.x) / 2;
          const topY = (pIdxA.y + pIdxB.y) / 2;
          const bottomX = (pThmA.x + pThmB.x) / 2;
          const bottomY = (pThmA.y + pThmB.y) / 2;
          
          liveHeartCenter.x = (topX + bottomX) / 2;
          liveHeartCenter.y = (topY + bottomY) / 2 - (isMobile ? height * 0.02 : height * 0.01);

          const spaceHeight = Math.hypot(topX - bottomX, topY - bottomY);
          liveHeartScale = spaceHeight / 28; 

          return true;
        }
      }
      return false;
    }

    function onResults(results) {
      const hands = results.multiHandLandmarks;

      if (hands && hands.length > 0) {
        const isHeart = processHands(hands);
        
        if (currentState === 'IDLE') {
          if (isHeart) {
            heartHoldFrames++;
            statusEl.style.opacity = 0; 

            if (heartHoldFrames > FRAMES_TO_TRIGGER) {
              triggerCinematicSequence();
            }
          } else {
            heartHoldFrames = 0;
            statusEl.innerText = "Xếp hai tay hình trái tim trước Camera để kích hoạt";
            statusEl.style.opacity = 1;
          }
        }
      } else {
        currentHandsData = null;
        if (currentState === 'IDLE') {
          heartHoldFrames = 0;
          statusEl.innerText = "Đang quét tìm bàn tay...";
          statusEl.style.opacity = 1;
        }
      }
    }

    function triggerCinematicSequence() {
      currentState = 'GATHERING_HEART';

      particles.forEach(p => {
        p.color = 'rgba(255, 185, 195, 0.85)'; 
        p.ease = 0.04 + Math.random() * 0.02; 
      });

      setTimeout(() => {
        currentState = 'SPINNING_HEART';
        video.style.opacity = 0; 
      }, 1500);

      setTimeout(() => {
        currentState = 'REVEALING_TEXT';
        
        particles.forEach((p, i) => {
          p.targetX = textPoints[i].x;
          p.targetY = textPoints[i].y;
          p.color = 'rgba(255, 255, 255, 0.88)'; 
          p.ease = 0.016 + Math.random() * 0.016;
          p.friction = 0.91;
        });
      }, 3600); 
    }

    function animate() {
      requestAnimationFrame(animate);

      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(13, 13, 17, 0.25)'; 
      ctx.fillRect(0, 0, width, height);
      
      ctx.globalCompositeOperation = 'source-over';

      // 1. VÒNG TRÒN TIẾN TRÌNH % TRÊN TÂM TAY
      if (currentState === 'IDLE' && heartHoldFrames > 0) {
        ctx.save();
        ctx.translate(liveHeartCenter.x, liveHeartCenter.y);
        ctx.scale(-1, 1); 

        let progress = heartHoldFrames / FRAMES_TO_TRIGGER;
        let radius = Math.max(liveHeartScale * 14, 40);

        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 0, radius, -Math.PI / 2, (-Math.PI / 2) + (progress * Math.PI * 2));
        ctx.lineWidth = 3.0; 
        ctx.strokeStyle = 'rgba(255, 150, 175, 0.9)';
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.font = '700 13px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${Math.floor(progress * 100)}%`, 0, -2);
        
        ctx.fillStyle = 'rgba(255, 150, 175, 0.6)';
        ctx.font = 'bold 8px -apple-system, sans-serif';
        ctx.fillText('CONNECTING', 0, 14);

        ctx.restore();
      }

      // 2. VẼ KHUNG XƯƠNG TAY KHỬ LỆCH TỌA ĐỘ
      if (currentHandsData && currentState !== 'REVEALING_TEXT' && video.style.opacity !== '0') {
        currentHandsData.forEach(hand => {
          const strokeStyle = heartHoldFrames > 0 ? 'rgba(255, 185, 195, 0.22)' : 'rgba(255, 255, 255, 0.1)';
          const fillStyle = heartHoldFrames > 0 ? 'rgba(255, 185, 195, 0.45)' : 'rgba(255, 255, 255, 0.25)';

          ctx.save();
          ctx.lineWidth = 1.0;
          ctx.strokeStyle = strokeStyle;

          HAND_CONNECTIONS.forEach(([i, j]) => {
            const p1 = getCanvasCoords(hand[i]);
            const p2 = getCanvasCoords(hand[j]);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
          });

          ctx.fillStyle = fillStyle;
          hand.forEach(pt => {
            const screenPt = getCanvasCoords(pt);
            ctx.beginPath();
            ctx.arc(screenPt.x, screenPt.y, 1.2, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.restore();
        });
      }

      // 3. VẬT LÝ VÀ ĐỘNG LỰC HỌC HẠT THÍCH ỨNG DEVICE
      particles.forEach((p, i) => {
        if (currentState === 'IDLE') {
          p.vx += Math.sin(p.angle) * 0.04;
          p.vy += Math.cos(p.angle) * 0.04;
          p.angle += p.angleSpeed;

          // Tương tác dạt hạt khi vuốt/di chuyển tay qua
          if (currentHandsData) {
            currentHandsData.forEach(hand => {
              const keyJoints = [0, 4, 8, 12, 16, 20];
              keyJoints.forEach(idx => {
                let screenPt = getCanvasCoords(hand[idx]);
                let dx = p.x - screenPt.x;
                let dy = p.y - screenPt.y;
                let dist = Math.hypot(dx, dy);
                
                let repulseRadius = isMobile ? 45 : 65;
                if (dist < repulseRadius) { 
                  let force = (repulseRadius - dist) / repulseRadius * 1.6; 
                  p.vx += (dx / (dist || 1)) * force;
                  p.vy += (dy / (dist || 1)) * force;
                }
              });
            });
          }

          // Hiệu ứng hút nhẹ kích thích khi sạc phần trăm
          if (heartHoldFrames > 0) {
            let progress = heartHoldFrames / FRAMES_TO_TRIGGER;
            let dx = liveHeartCenter.x - p.x;
            let dy = liveHeartCenter.y - p.y;
            let dist = Math.hypot(dx, dy) || 1;
            
            p.vx += (dx / dist) * progress * 0.2;
            p.vy += (dy / dist) * progress * 0.2;
            p.vx += (Math.random() - 0.5) * progress * 1.0;
            p.vy += (Math.random() - 0.5) * progress * 1.0;
          }

          p.vx *= 0.88;
          p.vy *= 0.88;
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;

        } else if (currentState === 'GATHERING_HEART') {
          let targetX = liveHeartCenter.x + heartOffsets[i].rawX * liveHeartScale;
          let targetY = liveHeartCenter.y + heartOffsets[i].rawY * liveHeartScale;

          p.vx += (targetX - p.x) * p.ease;
          p.vy += (targetY - p.y) * p.ease;
          p.vx *= p.friction;
          p.vy *= p.friction;
          p.x += p.vx;
          p.y += p.vy;

        } else if (currentState === 'SPINNING_HEART') {
          heartRotationAngle += 0.00012; 
          
          let rx = heartOffsets[i].rawX * Math.cos(heartRotationAngle) - heartOffsets[i].rawY * Math.sin(heartRotationAngle);
          let ry = heartOffsets[i].rawX * Math.sin(heartRotationAngle) + heartOffsets[i].rawY * Math.cos(heartRotationAngle);

          let targetX = liveHeartCenter.x + rx * liveHeartScale;
          let targetY = liveHeartCenter.y + ry * liveHeartScale;

          p.vx += (targetX - p.x) * 0.07;
          p.vy += (targetY - p.y) * 0.07;
          p.vx *= 0.86;
          p.vy *= 0.86;
          p.x += p.vx;
          p.y += p.vy;

        } else if (currentState === 'REVEALING_TEXT') {
          p.vx += (p.targetX - p.x) * p.ease;
          p.vy += (p.targetY - p.y) * p.ease;
          p.vx *= p.friction;
          p.vy *= p.friction;
          p.x += p.vx;
          p.y += p.vy;
        }

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.75,
      minTrackingConfidence: 0.75
    });

    hands.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({ image: video });
      },
      width: 640,
      height: 480
    });

    video.addEventListener('loadedmetadata', () => {
      calculateTargets();
    });

    calculateTargets();
    animate();
    
    camera.start().then(() => {
      statusEl.innerText = "Xếp hai tay hình trái tim để kích hoạt";
    }).catch(err => {
      statusEl.innerText = "Vui lòng cấp quyền mở Camera.";
    });
  </script>
</body>
</html>
