<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorcerer Heart Reveal - Interactive Dust</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0d0d11;
      overflow: hidden;
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #camera-feed {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1); 
      transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }

    #bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d0d11;
      z-index: 0;
    }

    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      transform: scaleX(-1); 
      z-index: 10;
      pointer-events: none;
    }

    #status {
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      z-index: 20;
      background: rgba(15, 15, 20, 0.5);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 13px;
      letter-spacing: 1px;
      text-align: center;
      transition: opacity 0.5s ease;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
</head>
<body>

  <div id="bg-layer"></div>
  <video id="camera-feed" autoplay playsinline muted></video>
  <canvas id="particle-canvas"></canvas>
  
  <div id="status">Đang kết nối camera...</div>

  <script>
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      calculateTargets();
    });

    const HAND_CONNECTIONS = [
      [0, 1], [1, 2], [2, 3], [3, 4],         
      [0, 5], [5, 6], [6, 7], [7, 8],         
      [0, 9], [9, 10], [10, 11], [11, 12],    
      [0, 13], [13, 14], [14, 15], [15, 16],  
      [0, 17], [17, 18], [18, 19], [19, 20],  
      [5, 9], [9, 13], [13, 17]               
    ];

    let particles = [];      
    const TEXT = "em ăn cơm chưa?";
    
    let currentState = 'IDLE'; 
    let heartHoldFrames = 0;
    const FRAMES_TO_TRIGGER = 50; 

    let liveHeartCenter = { x: width / 2, y: height / 2 };
    let liveHeartScale = 1.0;
    let currentHandsData = null; 
    let heartRotationAngle = 0;

    let textPoints = [];
    let heartOffsets = [];

    function calculateTargets() {
      textPoints = [];
      heartOffsets = [];

      const tempCanvas = document.createElement('canvas');
      const tCtx = tempCanvas.getContext('2d');
      tempCanvas.width = width;
      tempCanvas.height = height;
      
      tCtx.fillStyle = 'white';
      tCtx.textAlign = 'center';
      tCtx.textBaseline = 'middle';
      const fontSize = Math.min(width * 0.06, 65);
      tCtx.font = `600 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
      tCtx.fillText(TEXT, width / 2, height / 2);

      const imgData = tCtx.getImageData(0, 0, width, height).data;
      
      const step = 4; 
      for (let y = 0; y < height; y += step) {
        for (let x = 0; x < width; x += step) {
          if (imgData[(y * width + x) * 4 + 3] > 128) {
            textPoints.push({ x: width - x, y }); 
          }
        }
      }

      for (let i = 0; i < textPoints.length; i++) {
        const t = Math.random() * Math.PI * 2;
        const hx = 16 * Math.pow(Math.sin(t), 3);
        const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        heartOffsets.push({ rawX: hx, rawY: hy });
      }

      if (particles.length === 0) initParticles();
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < textPoints.length; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: 0, vy: 0,
          angle: Math.random() * Math.PI * 2,
          angleSpeed: 0.01 + Math.random() * 0.015,
          friction: 0.92,
          ease: 0.02 + Math.random() * 0.015,
          size: 1.1 + Math.random() * 1.3,
          color: 'rgba(255, 255, 255, 0.6)' 
        });
      }
    }

    function processHands(hands) {
      currentHandsData = hands;

      if (hands.length === 2) {
        const handA = hands[0];
        const handB = hands[1];
        
        const thumbA = handA[4], thumbB = handB[4];
        const indexA = handA[8], indexB = handB[8];
        const wristA = handA[0], wristB = handB[0];
        
        const thumbDist = Math.hypot(thumbA.x - thumbB.x, thumbA.y - thumbB.y);
        const indexDist = Math.hypot(indexA.x - indexB.x, indexA.y - indexB.y);
        const wristSpread = Math.hypot(wristA.x - wristB.x, wristA.y - wristB.y);

        if (thumbDist < 0.12 && indexDist < 0.12 && wristSpread > 0.18) {
          const topX = (indexA.x + indexB.x) / 2;
          const topY = (indexA.y + indexB.y) / 2;
          const bottomX = (thumbA.x + thumbB.x) / 2;
          const bottomY = (thumbA.y + thumbB.y) / 2;
          
          liveHeartCenter.x = (topX + bottomX) / 2 * width;
          liveHeartCenter.y = ((topY + bottomY) / 2 - 0.01) * height;

          const spaceHeight = Math.hypot((topX - bottomX) * width, (topY - bottomY) * height);
          liveHeartScale = spaceHeight / 28; 

          return true;
        }
      }
      return false;
    }

    function onResults(results) {
      const hands = results.multiHandLandmarks;

      if (hands && hands.length > 0) {
        const isHeart = processHands(hands);
        
        if (currentState === 'IDLE') {
          if (isHeart) {
            heartHoldFrames++;
            statusEl.style.opacity = 0; 

            if (heartHoldFrames > FRAMES_TO_TRIGGER) {
              triggerCinematicSequence();
            }
          } else {
            heartHoldFrames = 0;
            statusEl.innerText = "Xếp tay hình trái tim để quét biểu tượng";
            statusEl.style.opacity = 1;
          }
        }
      } else {
        currentHandsData = null;
        if (currentState === 'IDLE') {
          heartHoldFrames = 0;
          statusEl.innerText = "Đang quét tìm bàn tay...";
          statusEl.style.opacity = 1;
        }
      }
    }

    function triggerCinematicSequence() {
      currentState = 'GATHERING_HEART';

      particles.forEach(p => {
        p.color = 'rgba(255, 185, 195, 0.85)'; 
        p.ease = 0.035 + Math.random() * 0.02; // Hút cực nhanh và dứt khoát
      });

      setTimeout(() => {
        currentState = 'SPINNING_HEART';
        video.style.opacity = 0; 
      }, 1600);

      setTimeout(() => {
        currentState = 'REVEALING_TEXT';
        
        particles.forEach((p, i) => {
          p.targetX = textPoints[i].x;
          p.targetY = textPoints[i].y;
          p.color = 'rgba(255, 255, 255, 0.85)'; 
          p.ease = 0.015 + Math.random() * 0.015;
          p.friction = 0.92;
        });
      }, 3800); 
    }

    function animate() {
      requestAnimationFrame(animate);

      ctx.globalCompositeOperation = 'destination-out';
      ctx.fillStyle = 'rgba(13, 13, 17, 0.24)'; 
      ctx.fillRect(0, 0, width, height);
      
      ctx.globalCompositeOperation = 'source-over';

      // 1. GIAO DIỆN SẠC RADAR TÂM TAY CAO CẤP
      if (currentState === 'IDLE' && heartHoldFrames > 0) {
        ctx.save();
        ctx.translate(liveHeartCenter.x, liveHeartCenter.y);
        ctx.scale(-1, 1); 

        let progress = heartHoldFrames / FRAMES_TO_TRIGGER;
        let radius = liveHeartScale * 14;

        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 0, radius, -Math.PI / 2, (-Math.PI / 2) + (progress * Math.PI * 2));
        ctx.lineWidth = 3.0; // Làm dày thanh loading nổi bật hơn
        ctx.strokeStyle = 'rgba(255, 150, 175, 0.9)';
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.font = '700 14px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${Math.floor(progress * 100)}%`, 0, -2);
        
        ctx.fillStyle = 'rgba(255, 150, 175, 0.6)';
        ctx.font = 'bold 9px -apple-system, sans-serif';
        ctx.fillText('CONNECTING', 0, 14);

        ctx.restore();
      }

      // 2. VẼ KHUNG XƯƠNG TAY TỐI GIẢN
      if (currentHandsData && currentState !== 'REVEALING_TEXT' && video.style.opacity !== '0') {
        currentHandsData.forEach(hand => {
          const strokeStyle = heartHoldFrames > 0 ? 'rgba(255, 185, 195, 0.25)' : 'rgba(255, 255, 255, 0.12)';
          const fillStyle = heartHoldFrames > 0 ? 'rgba(255, 185, 195, 0.5)' : 'rgba(255, 255, 255, 0.3)';

          ctx.save();
          ctx.lineWidth = 1.0;
          ctx.strokeStyle = strokeStyle;

          HAND_CONNECTIONS.forEach(([i, j]) => {
            const p1 = hand[i];
            const p2 = hand[j];
            ctx.beginPath();
            ctx.moveTo(p1.x * width, p1.y * height);
            ctx.lineTo(p2.x * width, p2.y * height);
            ctx.stroke();
          });

          ctx.fillStyle = fillStyle;
          hand.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x * width, pt.y * height, 1.5, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.restore();
        });
      }

      // 3. VẬT LÝ VÀ ĐỘNG LỰC HỌC HẠT (BỔ SUNG TƯƠNG TÁC)
      particles.forEach((p, i) => {
        if (currentState === 'IDLE') {
          // Lực bay trôi nổi tự do nền tảng
          p.vx += Math.sin(p.angle) * 0.04;
          p.vy += Math.cos(p.angle) * 0.04;
          p.angle += p.angleSpeed;

          // [MỚI] TƯƠNG TÁC VẬT LÝ VỚI BÀN TAY KHI DI CHUYỂN
          if (currentHandsData) {
            currentHandsData.forEach(hand => {
              // Quét tương tác qua các điểm khớp chính (Cổ tay & 5 đầu ngón tay)
              const keyJoints = [0, 4, 8, 12, 16, 20];
              keyJoints.forEach(idx => {
                let pt = hand[idx];
                let hx = pt.x * width;
                let hy = pt.y * height;
                let dx = p.x - hx;
                let dy = p.y - hy;
                let dist = Math.hypot(dx, dy);
                
                if (dist < 65) { // Khoảng cách từ trường phản xạ
                  let force = (65 - dist) / 65 * 1.8; 
                  p.vx += (dx / (dist || 1)) * force;
                  p.vy += (dy / (dist || 1)) * force;
                }
              });
            });
          }

          // [MỚI] HIỆU ỨNG RUNG ĐỘNG VÀ HÚT NHẸ KHI ĐANG GỒNG SẠC (%)
          if (heartHoldFrames > 0) {
            let progress = heartHoldFrames / FRAMES_TO_TRIGGER;
            let dx = liveHeartCenter.x - p.x;
            let dy = liveHeartCenter.y - p.y;
            let dist = Math.hypot(dx, dy) || 1;
            
            // Hút nhẹ hạt hướng về tâm tay tăng dần theo tiến độ %
            p.vx += (dx / dist) * progress * 0.18;
            p.vy += (dy / dist) * progress * 0.18;
            
            // Tạo độ nhiễu điện (vibrate) kích thích hạt
            p.vx += (Math.random() - 0.5) * progress * 1.2;
            p.vy += (Math.random() - 0.5) * progress * 1.2;
          }

          // Áp dụng ma sát động để hạt mượt mà, không bị bắn văng quá tốc độ
          p.vx *= 0.88;
          p.vy *= 0.88;
          p.x += p.vx;
          p.y += p.vy;

          // Xử lý bo biên màn hình tuần hoàn
          if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;

        } else if (currentState === 'GATHERING_HEART') {
          // Tụ dứt khoát thành hình trái tim tĩnh trong tay
          let targetX = liveHeartCenter.x + heartOffsets[i].rawX * liveHeartScale;
          let targetY = liveHeartCenter.y + heartOffsets[i].rawY * liveHeartScale;

          p.vx += (targetX - p.x) * p.ease;
          p.vy += (targetY - p.y) * p.ease;
          p.vx *= p.friction;
          p.vy *= p.friction;
          p.x += p.vx;
          p.y += p.vy;

        } else if (currentState === 'SPINNING_HEART') {
          // Xếp khuôn xong mới kích hoạt xoay vòng vòng
          heartRotationAngle += 0.0001; 
          
          let rx = heartOffsets[i].rawX * Math.cos(heartRotationAngle) - heartOffsets[i].rawY * Math.sin(heartRotationAngle);
          let ry = heartOffsets[i].rawX * Math.sin(heartRotationAngle) + heartOffsets[i].rawY * Math.cos(heartRotationAngle);

          let targetX = liveHeartCenter.x + rx * liveHeartScale;
          let targetY = liveHeartCenter.y + ry * liveHeartScale;

          p.vx += (targetX - p.x) * 0.07;
          p.vy += (targetY - p.y) * 0.07;
          p.vx *= 0.86;
          p.vy *= 0.86;
          p.x += p.vx;
          p.y += p.vy;

        } else if (currentState === 'REVEALING_TEXT') {
          // Nền đen hoàn toàn, xếp chữ
          p.vx += (p.targetX - p.x) * p.ease;
          p.vy += (p.targetY - p.y) * p.ease;
          p.vx *= p.friction;
          p.vy *= p.friction;
          p.x += p.vx;
          p.y += p.vy;
        }

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.75,
      minTrackingConfidence: 0.75
    });

    hands.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => {
        await hands.send({ image: video });
      },
      width: 640,
      height: 480
    });

    calculateTargets();
    animate();
    camera.start().then(() => {
      statusEl.innerText = "Xếp tay hình trái tim để quét biểu tượng";
    }).catch(err => {
      statusEl.innerText = "Vui lòng cấp quyền truy cập Camera.";
    });
  </script>
</body>
</html>
